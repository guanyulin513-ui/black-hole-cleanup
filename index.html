<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
  />
  <title>黑洞收納所</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="gameRoot">
    <canvas id="gameCanvas"></canvas>

    <div id="hudTop">
      <button id="menuBtn" class="icon-btn" aria-label="選單">
        <span></span><span></span><span></span>
      </button>

      <div class="hud-chip">
        <div class="hud-label">金幣</div>
        <div class="hud-value" id="moneyText">0</div>
      </div>

      <div class="hud-chip wide">
        <div class="hud-label">載量</div>
        <div class="hud-value"><span id="loadText">0</span> / <span id="capacityText">0</span></div>
        <div class="bar">
          <div class="bar-fill" id="loadBarFill"></div>
        </div>
      </div>

      <div class="hud-chip">
        <div class="hud-label">進度</div>
        <div class="hud-value"><span id="progressText">0</span>%</div>
      </div>
    </div>

    <div id="hintText">拖曳畫面移動。靠近綠色換錢區會自動出售，靠近藍色升級區會打開升級畫面。</div>

    <div id="menuOverlay" class="overlay hidden">
      <div class="panel menu-panel">
        <div class="panel-head">
          <h2>關卡選單</h2>
          <button id="closeMenuBtn" class="close-btn">✕</button>
        </div>

        <div class="menu-section">
          <div class="menu-title">已解鎖關卡</div>
          <div id="levelList" class="level-list"></div>
        </div>

        <div class="menu-section">
          <div class="menu-title">其他</div>
          <div class="menu-actions">
            <button id="saveBtn">手動存檔</button>
            <button id="resetBtn" class="danger">重置存檔</button>
          </div>
        </div>
      </div>
    </div>

    <div id="upgradeOverlay" class="overlay hidden">
      <div class="panel upgrade-panel">
        <div class="panel-head">
          <h2>基地升級</h2>
          <button id="closeUpgradeBtn" class="close-btn">✕</button>
        </div>

        <div class="upgrade-grid">
          <div class="upgrade-card">
            <div class="upgrade-title">黑洞</div>
            <div id="holeInfo" class="upgrade-info"></div>
            <button id="upgradeHoleBtn">升級黑洞</button>
          </div>

          <div class="upgrade-card">
            <div class="upgrade-title">礦車總升級</div>
            <div id="allCartInfo" class="upgrade-info"></div>
            <button id="upgradeAllCartsBtn">升級全部礦車</button>
          </div>
        </div>

        <div class="minecart-area">
          <div class="menu-title">各礦車</div>
          <div id="minecartList" class="minecart-list"></div>
        </div>
      </div>
    </div>

    <div id="messageLog"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
